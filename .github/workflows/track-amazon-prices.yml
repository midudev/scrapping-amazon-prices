name: Track Amazon prices

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tracker
        env:
          DECODO_AUTH_TOKEN: ${{ secrets.DECODO_AUTH_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          AMAZON_ASINS: ${{ secrets.AMAZON_ASINS }}
        run: pnpm track:proxy
